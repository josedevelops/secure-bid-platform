services:
  # API Service
  api:
    container_name: securebid_api
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    # mount local code into container so changes reflect without rebuild
    # this means tests, new files, and edits are visible immediately
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - securebid_network
  # PostgreSQL
  db:
    container_name: securebid_db
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securebid_network
# Volumes
volumes:
  postgres_data:
# Networks
networks:
  securebid_network:
    driver: bridge
