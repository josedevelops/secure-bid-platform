apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: securebid
  labels:
    app.kubernetes.io/name: secure-bid-platform
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        app.kubernetes.io/component: api
    spec:
      initContainers:
        - name: migrate
          image: secure-bid-platform:latest
          imagePullPolicy: Never
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: securebid-secret
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: securebid-secret
                  key: SECRET_KEY
      containers:
        - name: api
          image: secure-bid-platform:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: securebid-secret
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: securebid-secret
                  key: SECRET_KEY
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: securebid-config
                  key: APP_NAME
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: securebid-config
                  key: APP_VERSION
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: securebid-config
                  key: ENVIRONMENT
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: securebid-config
                  key: DEBUG
            - name: ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: securebid-config
                  key: ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: securebid-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: securebid-config
                  key: ALLOWED_ORIGINS
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
