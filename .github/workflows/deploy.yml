# deploy.yml — CI/CD pipeline for secure-bid-platform
# Job 1: test — runs full test suite on every push
# Job 2: deploy — SSH to server, git pull, rebuild image, kubectl apply
# same pattern as 211 — no registry needed, image built on server

name: Test and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: securebid
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test env file
        run: |
          cat > .env << EOF
          APP_NAME=Secure Bid Platform
          APP_VERSION=1.0.0
          DEBUG=True
          ENVIRONMENT=test
          DATABASE_URL=postgresql+asyncpg://appuser:changeme@localhost:5432/securebid
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          ALLOWED_ORIGINS=["http://localhost:3000"]
          TEST_DB_HOST=localhost
          POSTGRES_USER=appuser
          POSTGRES_PASSWORD=changeme
          POSTGRES_DB=securebid
          EOF

      - name: Create test database
        run: psql postgresql://appuser:changeme@localhost:5432/securebid -c "CREATE DATABASE securebid_test;"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v

  # ── Job 2: Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            cd ~/secure-bid-platform

            # pull latest code
            git pull origin main

            # point Docker at minikube so the image lands inside the cluster
            eval $(minikube docker-env)

            # build image with git commit hash tag for traceability
            docker build -t secure-bid-platform:${{ github.sha }} .
            docker tag secure-bid-platform:${{ github.sha }} secure-bid-platform:latest

            # update the deployment to use the new image
            kubectl set image deployment/app \
              api=secure-bid-platform:latest \
              -n securebid

            # wait for rollout to complete before declaring success
            kubectl rollout status deployment/app -n securebid --timeout=120s

            # confirm health after deploy
            sleep 5
            curl -sf http://localhost/health || exit 1
