# deploy.yml — CI/CD pipeline for secure-bid-platform
# triggers on every push to main

# Job 1: test — runs the full test suite
# Job 2: deploy — only runs if tests pass, deploys to the server

name: Test and Deploy

on:
  push:
    branches:
      - main
  # allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:

  # --- Job 1: Test ---
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    services:
      # spin up a postgres container for the tests
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: securebid_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test env file
        run: |
          cat > .env << EOF
          APP_NAME=Secure Bid Platform
          APP_VERSION=1.0.0
          DEBUG=True
          ENVIRONMENT=test
          DATABASE_URL=postgresql+asyncpg://appuser:changeme@localhost:5432/securebid
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          ALLOWED_ORIGINS=["http://localhost:3000"]
          POSTGRES_USER=appuser
          POSTGRES_PASSWORD=changeme
          POSTGRES_DB=securebid
          EOF

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v

  # --- Job 2: Deploy ---
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test
    # only deploy on push to main — not on manual workflow_dispatch test runs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/secure-bid-platform

            # pull latest code
            git pull origin main

            # apply any new migrations before restarting
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              exec -T api alembic upgrade head

            # rebuild and restart with prod config
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --build

            # confirm health after deploy
            sleep 5
            curl -sf http://localhost:8000/health || exit 1
