# nginx.conf — reverse proxy for the secure-bid-platform API
# nginx sits in front of the FastAPI app — it handles SSL termination,
# rate limiting, and security headers before traffic reaches the app

# number of worker processes — auto means one per CPU core
worker_processes auto;

events {
    # maximum simultaneous connections per worker
    worker_connections 1024;
}

http {
    # hide nginx version from response headers — reduces attack surface
    server_tokens off;

    # logging format — includes request time for performance monitoring
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # rate limiting zone — 10 requests per second per IP
    # zone=api_limit:10m means we store 10MB of IP state (about 160k IPs)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # stricter rate limit for auth endpoints — 3 requests per second per IP
    # prevents brute force attacks on login and signup
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;

    upstream api {
        # points to the FastAPI container by service name
        # Docker's internal DNS resolves 'api' to the container IP
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # security headers — applied to every response
        # X-Frame-Options prevents clickjacking
        add_header X-Frame-Options "DENY" always;
        # X-Content-Type-Options prevents MIME sniffing
        add_header X-Content-Type-Options "nosniff" always;
        # X-XSS-Protection enables browser XSS filter
        add_header X-XSS-Protection "1; mode=block" always;
        # Referrer-Policy controls how much referrer info is sent
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # max request body size — matches our body-parser limit
        client_max_body_size 1m;

        # auth endpoints — stricter rate limit
        # burst=5 allows short bursts of up to 5 requests before limiting
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # all other API endpoints — standard rate limit
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # health check — no rate limiting, used by load balancers
        location /health {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        # metrics endpoint — restricted to localhost only
        # prometheus scrapes this — should never be public
        location /metrics {
            allow 127.0.0.1;
            # allow prometheus container by its Docker network subnet
            allow 172.0.0.0/8;
            deny all;
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        # docs — only available in non-production environments
        location /docs {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }
    }
}
